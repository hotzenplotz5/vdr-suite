<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VDR-Suite Frontend</title>
  <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
  <header><h1>VDR-Suite Frontend</h1></header>
  <main>
    <p id="status" class="status">Lade Backend-Auswahl...</p>
    <section class="layout">
      <section id="backends" class="backend-list" aria-label="Backend-Auswahl"></section>
      <section id="detail" class="detail-card" aria-live="polite">
        <div class="detail-header">
          <h2>Backend-Details</h2>
          <button id="refresh-detail" type="button" disabled>Aktualisieren</button>
        </div>
        <div id="detail-meta" class="detail-meta">Noch kein Backend ausgewählt.</div>
        <nav id="module-nav" class="module-nav" aria-label="Backend-Module">
          <button type="button" class="module-tab active" data-module="overview">Übersicht</button>
          <button type="button" class="module-tab" data-module="channels">Kanäle</button>
          <button type="button" class="module-tab" data-module="timers">Timer</button>
          <button type="button" class="module-tab" data-module="recordings">Aufnahmen</button>
          <button type="button" class="module-tab" data-module="searchtimers">SearchTimer</button>
        </nav>
        <section id="detail-data" class="metric-grid">Klicke auf eine Backend-Karte.</section>
      </section>
    </section>
  </main>
  <script src="/frontend/app.js"></script>
  <script src="/frontend/channel-logos.js"></script>
  <script>
    let recordingSortMode = 'name';
    let recordingViewMode = 'folder';
    let currentRecordingRecords = [];

    function decodeRecordingText(value) {
      return String(value || '')
        .replace(/#([0-9A-Fa-f]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
        .replace(/_/g, ' ')
        .trim();
    }

    function recordingSortKey(value) {
      return decodeRecordingText(value).toLocaleLowerCase('de-DE');
    }

    function recordingTimestamp(entry) {
      const recording = entry.recording || entry;
      const value = firstValue(recording, ['startTime', 'start', 'date'], '');
      const number = Number(value);

      if (Number.isFinite(number) && number > 0) {
        return number;
      }

      return 0;
    }

    const originalRecordingDisplayParts = recordingDisplayParts;
    recordingDisplayParts = function(recording, index) {
      const display = originalRecordingDisplayParts(recording, index);
      return {
        folder: decodeRecordingText(display.folder),
        title: decodeRecordingText(display.title)
      };
    };

    function createRecordingNode(name, parent) {
      return { name, parent, folders: new Map(), items: [] };
    }

    function countRecordingNode(node) {
      let count = node.items.length;
      node.folders.forEach(child => { count += countRecordingNode(child); });
      return count;
    }

    function pathForRecordingNode(node) {
      const parts = [];
      let cursor = node;
      while (cursor && cursor.parent) {
        parts.unshift(cursor.name);
        cursor = cursor.parent;
      }
      return parts;
    }

    function buildRecordingTree(recordings) {
      const root = createRecordingNode('Aufnahme-Ordner', null);

      recordings.forEach((recording, index) => {
        const display = recordingDisplayParts(recording, index);
        const folders = display.folder.split('/').filter(Boolean);
        let node = root;

        folders.forEach(folder => {
          if (!node.folders.has(folder)) {
            node.folders.set(folder, createRecordingNode(folder, node));
          }
          node = node.folders.get(folder);
        });

        node.items.push({ recording, title: display.title, index });
      });

      return root;
    }

    function recordingGenreName(recording, index) {
      const display = recordingDisplayParts(recording, index);
      const parts = display.folder.split('/').filter(Boolean);
      return parts.length > 0 ? parts[0] : 'Ohne Genre';
    }

    function buildRecordingGenreTree(recordings) {
      const root = createRecordingNode('Aufnahme-Genres', null);

      recordings.forEach((recording, index) => {
        const display = recordingDisplayParts(recording, index);
        const genre = recordingGenreName(recording, index);

        if (!root.folders.has(genre)) {
          root.folders.set(genre, createRecordingNode(genre, root));
        }

        root.folders.get(genre).items.push({ recording, title: display.title, index });
      });

      return root;
    }

    function recordingRootNode() {
      if (recordingViewMode === 'genre') {
        return buildRecordingGenreTree(currentRecordingRecords);
      }

      return buildRecordingTree(currentRecordingRecords);
    }

    function renderRecordingRoot() {
      renderRecordingNode(recordingRootNode());
    }

    function sortedRecordingFolders(node) {
      return Array.from(node.folders.values()).sort((left, right) =>
        recordingSortKey(left.name).localeCompare(recordingSortKey(right.name), 'de-DE'));
    }

    function sortedRecordingItems(node) {
      const items = node.items.slice();

      if (recordingSortMode === 'date') {
        return items.sort((left, right) => {
          const dateDiff = recordingTimestamp(right) - recordingTimestamp(left);
          if (dateDiff !== 0) {
            return dateDiff;
          }
          return recordingSortKey(left.title).localeCompare(recordingSortKey(right.title), 'de-DE');
        });
      }

      return items.sort((left, right) =>
        recordingSortKey(left.title).localeCompare(recordingSortKey(right.title), 'de-DE'));
    }

    function renderRecordingViewButtons(container) {
      const controls = document.createElement('div');
      controls.className = 'module-nav';
      controls.setAttribute('aria-label', 'Aufnahmen-Ansicht');

      const folderButton = document.createElement('button');
      folderButton.type = 'button';
      folderButton.className = 'module-tab' + (recordingViewMode === 'folder' ? ' active' : '');
      folderButton.textContent = 'Ordner';
      folderButton.addEventListener('click', () => {
        recordingViewMode = 'folder';
        renderRecordingRoot();
      });

      const genreButton = document.createElement('button');
      genreButton.type = 'button';
      genreButton.className = 'module-tab' + (recordingViewMode === 'genre' ? ' active' : '');
      genreButton.textContent = 'Genre';
      genreButton.addEventListener('click', () => {
        recordingViewMode = 'genre';
        renderRecordingRoot();
      });

      controls.appendChild(folderButton);
      controls.appendChild(genreButton);
      container.appendChild(controls);
    }

    function renderRecordingSortButtons(node, container) {
      if (node.items.length < 2) {
        return;
      }

      const controls = document.createElement('div');
      controls.className = 'module-nav';
      controls.setAttribute('aria-label', 'Sortierung der Aufnahmen');

      const nameButton = document.createElement('button');
      nameButton.type = 'button';
      nameButton.className = 'module-tab' + (recordingSortMode === 'name' ? ' active' : '');
      nameButton.textContent = 'A-Z';
      nameButton.addEventListener('click', () => {
        recordingSortMode = 'name';
        renderRecordingNode(node);
      });

      const dateButton = document.createElement('button');
      dateButton.type = 'button';
      dateButton.className = 'module-tab' + (recordingSortMode === 'date' ? ' active' : '');
      dateButton.textContent = 'Datum';
      dateButton.addEventListener('click', () => {
        recordingSortMode = 'date';
        renderRecordingNode(node);
      });

      controls.appendChild(nameButton);
      controls.appendChild(dateButton);
      container.appendChild(controls);
    }

    function renderRecordingEntry(entry) {
      const recording = entry.recording;
      const item = document.createElement('article');
      item.className = 'list-item';
      const recordingId = firstValue(recording, ['recordingId', 'id', 'nativeId'], '-');
      const path = firstValue(recording, ['path', 'fileName', 'directory'], '-');
      const startTime = formatRecordingStart(firstValue(recording, ['startTime', 'start', 'date'], '-'));
      const duration = formatDurationSeconds(firstValue(recording, ['durationSeconds', 'duration'], 0));
      const size = formatSizeMb(firstValue(recording, ['sizeMb', 'sizeMB', 'size'], 0));

      item.appendChild(addText(document.createElement('div'), entry.title)).className = 'list-title';
      item.appendChild(addText(document.createElement('div'), 'Start: ' + startTime + ' · Dauer: ' + duration + ' · Größe: ' + size)).className = 'list-meta';
      item.appendChild(addText(document.createElement('div'), 'Pfad: ' + decodeRecordingText(String(path)))).className = 'list-meta';
      item.appendChild(addText(document.createElement('div'), 'ID: ' + String(recordingId))).className = 'list-meta';
      return item;
    }

    function renderRecordingNode(node) {
      detailDataElement.replaceChildren();
      const list = document.createElement('section');
      list.className = 'list';

      const header = document.createElement('article');
      header.className = 'module-placeholder';
      const path = pathForRecordingNode(node);
      const title = path.length === 0
        ? (recordingViewMode === 'genre' ? 'Aufnahme-Genres' : 'Aufnahme-Ordner')
        : path.join(' / ');
      header.appendChild(addText(document.createElement('h3'), title));
      header.appendChild(addText(document.createElement('p'), String(node.folders.size) + ' Ordner · ' + String(countRecordingNode(node)) + ' Aufnahme(n)'));
      renderRecordingViewButtons(header);
      renderRecordingSortButtons(node, header);

      if (node.parent) {
        const backButton = document.createElement('button');
        backButton.type = 'button';
        backButton.textContent = 'Zurück';
        backButton.addEventListener('click', () => renderRecordingNode(node.parent));
        header.appendChild(backButton);
      }

      list.appendChild(header);

      sortedRecordingFolders(node).forEach(folder => {
        const item = document.createElement('article');
        item.className = 'list-item';
        item.tabIndex = 0;
        item.setAttribute('role', 'button');
        item.setAttribute('aria-label', 'Ordner ' + folder.name + ' öffnen');
        item.appendChild(addText(document.createElement('div'), folder.name)).className = 'list-title';
        item.appendChild(addText(document.createElement('div'), String(countRecordingNode(folder)) + ' Aufnahme(n) · antippen zum Öffnen')).className = 'list-meta';

        const openFolder = () => renderRecordingNode(folder);
        item.addEventListener('click', openFolder);
        item.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openFolder();
          }
        });
        list.appendChild(item);
      });

      sortedRecordingItems(node).slice(0, 20).forEach(entry => {
        list.appendChild(renderRecordingEntry(entry));
      });

      if (node.items.length > 20) {
        const info = document.createElement('article');
        info.className = 'module-placeholder';
        info.appendChild(addText(document.createElement('p'), 'Zeige 20 von ' + String(node.items.length) + ' Aufnahmen in diesem Ordner.'));
        list.appendChild(info);
      }

      detailDataElement.appendChild(list);
    }

    renderRecordingList = function(data) {
      const recordings = listFromResponse(data, 'recordings');
      currentRecordingRecords = recordings;
      detailDataElement.replaceChildren();

      if (recordings.length === 0) {
        const empty = document.createElement('article');
        empty.className = 'module-placeholder';
        empty.appendChild(addText(document.createElement('h3'), 'Keine Aufnahmen gefunden'));
        empty.appendChild(addText(document.createElement('p'), 'Der Endpunkt /api/vdr/recordings hat aktuell keine Aufnahmen geliefert.'));
        detailDataElement.appendChild(empty);
        return;
      }

      renderRecordingRoot();
    };

    function formatFrontendNumber(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) {
        return String(value || '0');
      }
      return number.toLocaleString('de-DE');
    }

    function formatFrontendTime(seconds) {
      const value = parseFrontendEventEpoch(seconds);
      if (value <= 0) {
        return '-';
      }
      return new Date(value * 1000).toLocaleString('de-DE', {
        day: '2-digit',
        month: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function channelNameById(channels) {
      const names = new Map();
      channels.forEach(channel => {
        const id = frontendChannelId(channel);
        if (id !== '') {
          names.set(id, String(firstValue(channel, ['name', 'channelName', 'title'], id)));
        }
      });
      return names;
    }

    function isRtl2ChannelName(name) {
      return String(name || '').toLocaleLowerCase('de-DE').replace(/\s+/g, '').includes('rtl2');
    }

    function eventSearchText(event) {
      return [
        firstValue(event, ['title', 'name'], ''),
        firstValue(event, ['subtitle', 'shortText', 'short_text'], ''),
        firstValue(event, ['description', 'text'], '')
      ].join(' ').toLocaleLowerCase('de-DE');
    }

    function createSearchTimerHitItem(event, channelNames) {
      const item = document.createElement('article');
      item.className = 'list-item search-hit';
      const channelId = frontendEventChannelId(event);
      const channelName = channelNames.get(channelId) || channelId || '-';
      const title = String(firstValue(event, ['title', 'name'], 'Unbenannte Sendung'));
      const start = firstValue(event, ['startTime', 'start', 'beginTime'], '');
      const end = firstValue(event, ['endTime', 'end', 'stopTime'], '');

      item.appendChild(addText(document.createElement('div'), title)).className = 'list-title';
      item.appendChild(addText(document.createElement('div'), channelName + ' · ' + formatFrontendTime(start) + ' – ' + formatFrontendTime(end))).className = 'list-meta';
      item.appendChild(addText(document.createElement('div'), 'Treffer: Beschreibung/Titel enthält „Trump“')).className = 'list-meta';
      return item;
    }

    function renderSearchTimerCockpit(searchTimerData, eventData, channelData, timerData) {
      const searchTimers = listFromResponse(searchTimerData, 'searchTimers')
        .concat(listFromResponse(searchTimerData, 'searchtimers'))
        .concat(listFromResponse(searchTimerData, 'timers'));
      const events = listFromResponse(eventData, 'events');
      const channels = listFromResponse(channelData, 'channels');
      const timers = listFromResponse(timerData, 'timers');
      const channelNames = channelNameById(channels);
      const now = Math.floor(Date.now() / 1000);
      const twoDays = now + 2 * 24 * 60 * 60;

      const trumpHits = events.filter(event => {
        const start = parseFrontendEventEpoch(firstValue(event, ['startTime', 'start', 'beginTime'], 0));
        const channelName = channelNames.get(frontendEventChannelId(event)) || '';
        return start >= now
          && start <= twoDays
          && eventSearchText(event).includes('trump')
          && !isRtl2ChannelName(channelName);
      });

      detailDataElement.replaceChildren();

      const hero = document.createElement('section');
      hero.className = 'search-cockpit hero-panel';
      hero.appendChild(addText(document.createElement('h3'), 'SearchTimer Cockpit'));
      hero.appendChild(addText(document.createElement('p'), 'Automatische Aufnahmevorschläge, Treffer und Konfliktlage für den ausgewählten VDR.'));

      const stats = document.createElement('div');
      stats.className = 'cockpit-stats';
      stats.appendChild(createMetric('SearchTimer', formatFrontendNumber(searchTimers.length)));
      stats.appendChild(createMetric('EPG Events', formatFrontendNumber(events.length)));
      stats.appendChild(createMetric('Trump / 2 Tage', formatFrontendNumber(trumpHits.length)));
      stats.appendChild(createMetric('Timer aktiv', formatFrontendNumber(timers.length)));
      hero.appendChild(stats);
      detailDataElement.appendChild(hero);

      const proposal = document.createElement('section');
      proposal.className = 'list';
      const proposalHeader = document.createElement('article');
      proposalHeader.className = 'module-placeholder search-proposal';
      proposalHeader.appendChild(addText(document.createElement('h3'), 'Vorschlag: „Trump“ aufnehmen'));
      proposalHeader.appendChild(addText(document.createElement('p'), 'Regel: Suche in Titel/Beschreibung · Zeitraum nächste 2 Tage · Ausschluss: RTL2.'));
      proposalHeader.appendChild(addText(document.createElement('p'), 'Aktuelle Treffer: ' + formatFrontendNumber(trumpHits.length) + ' von ' + formatFrontendNumber(events.length) + ' EPG-Einträgen.'));
      proposal.appendChild(proposalHeader);

      trumpHits.slice(0, 12).forEach(event => {
        proposal.appendChild(createSearchTimerHitItem(event, channelNames));
      });

      if (trumpHits.length === 0) {
        const empty = document.createElement('article');
        empty.className = 'list-item';
        empty.appendChild(addText(document.createElement('div'), 'Keine aktuellen Treffer')).className = 'list-title';
        empty.appendChild(addText(document.createElement('div'), 'Der vollständige EPG ist geladen, aber im Zwei-Tage-Fenster wurde kein passender Treffer gefunden.')).className = 'list-meta';
        proposal.appendChild(empty);
      }

      if (trumpHits.length > 12) {
        const more = document.createElement('article');
        more.className = 'module-placeholder';
        more.appendChild(addText(document.createElement('p'), 'Zeige 12 von ' + formatFrontendNumber(trumpHits.length) + ' Treffern.'));
        proposal.appendChild(more);
      }

      detailDataElement.appendChild(proposal);
    }

    function loadSearchTimers() {
      renderModuleLoading('SearchTimer', 'Lade SearchTimer, EPG und Timer-Status...');

      const searchTimersRequest = fetch('/api/searchtimers')
        .then(response => response.ok ? response.json() : { searchTimers: [] })
        .catch(() => ({ searchTimers: [] }));

      const eventsRequest = fetch('/api/vdr/events')
        .then(response => response.ok ? response.json() : { events: [] })
        .catch(() => ({ events: [] }));

      const channelsRequest = fetch('/api/vdr/channels')
        .then(response => response.ok ? response.json() : { channels: [] })
        .catch(() => ({ channels: [] }));

      const timersRequest = fetch('/api/vdr/timers')
        .then(response => response.ok ? response.json() : { timers: [] })
        .catch(() => ({ timers: [] }));

      Promise.all([searchTimersRequest, eventsRequest, channelsRequest, timersRequest])
        .then(([searchTimerData, eventData, channelData, timerData]) => {
          renderSearchTimerCockpit(searchTimerData, eventData, channelData, timerData);
        })
        .catch(error => renderModuleError('SearchTimer konnte nicht geladen werden', error));
    }

    const baseRenderSnapshotMetrics = renderSnapshotMetrics;
    renderSnapshotMetrics = function(data) {
      detailDataElement.replaceChildren();
      const snapshotAvailable = data.snapshotAvailable ? 'ja' : 'nein';
      detailDataElement.appendChild(createMetric('Snapshot', snapshotAvailable));
      detailDataElement.appendChild(createMetric('Kanäle', formatFrontendNumber(valueOrZero(data.channelCount))));
      detailDataElement.appendChild(createMetric('EPG Events', formatFrontendNumber(valueOrZero(data.eventCount))));
      detailDataElement.appendChild(createMetric('Timer', formatFrontendNumber(valueOrZero(data.timerCount))));
      detailDataElement.appendChild(createMetric('Aufnahmen', formatFrontendNumber(valueOrZero(data.recordingCount))));

      const insight = document.createElement('article');
      insight.className = 'module-placeholder overview-insight';
      insight.appendChild(addText(document.createElement('h3'), 'Backend live'));
      insight.appendChild(addText(document.createElement('p'), 'Der Snapshot enthält ' + formatFrontendNumber(valueOrZero(data.eventCount)) + ' EPG-Einträge. SearchTimer kann daraus Vorschläge und Aufnahmeziele ableiten.'));
      detailDataElement.appendChild(insight);
    };

    const baseRenderSelectedModule = renderSelectedModule;
    renderSelectedModule = function(data) {
      if (selectedModule === 'searchtimers') {
        loadSearchTimers();
        return;
      }
      baseRenderSelectedModule(data);
    };

    const baseRenderBackend = renderBackend;
    renderBackend = function(backend) {
      const card = baseRenderBackend(backend);
      const selector = backend.frontendSelector || backend;
      const chips = document.createElement('div');
      chips.className = 'backend-summary-row';
      chips.appendChild(addText(document.createElement('span'), backend.online ? '🟢 Online' : '🔴 Offline'));
      chips.appendChild(addText(document.createElement('span'), selector.canWrite ? 'Schreiben' : 'Nur lesen'));
      chips.appendChild(addText(document.createElement('span'), selector.canWriteTimers ? 'Timer' : 'Timer gesperrt'));
      chips.appendChild(addText(document.createElement('span'), selector.canWriteSearchTimers ? 'SearchTimer' : 'SearchTimer gesperrt'));
      card.appendChild(chips);
      return card;
    };
  </script>
</body>
</html>
