name: VDR-Suite CI

on:
  push:
  pull_request:

jobs:
  docs-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check repository structure
        run: |
          test -f README.md
          test -f docs/project-principles.md
          test -f docs/phase-0/01-vision.md
          test -f docs/phase-0/02-architecture.md
          test -f docs/phase-0/03-data-model.md
          test -f docs/phase-0/04-service-layer.md
          test -f docs/adr/ADR-0001-monorepo.md
          test -f docs/planning/roadmap.md
          test -f docs/planning/milestones.md

      - name: Run documentation checks
        run: |
          make test-docs
          make test-phase

  fast-regression-test:
    runs-on: ubuntu-latest
    needs:
      - docs-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential make g++ sqlite3 libsqlite3-dev

      - name: Run fast CI regression test
        run: make test-ci-fast

      - name: Build daemon
        run: make daemon
